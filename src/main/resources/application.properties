spring.application.name=Miniproject01
 # DataSource Setting
 spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 spring.datasource.url=jdbc:mysql://localhost:3306/gbsorting
 spring.datasource.username=401
 spring.datasource.password=tiger
 # JPA Setting
 spring.jpa.hibernate.ddl-auto=update
 spring.jpa.show-sql=true
 spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
 # ViewResolver Setting
 spring.mvc.view.prefix=/WEB-INF/board/
 spring.mvc.view.suffix=.jsp
 # Thymeleaf Cache Setting
 spring.thymeleaf.cache=false
 # Security log level Setting
 logging.level.org.springframework.security=debug
 
spring.servlet.multipart.enabled=true
spring.servlet.multipart.location=C:\\upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
file.upload.directory=C:\\upload